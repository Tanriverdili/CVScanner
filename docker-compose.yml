version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: cv-postgres

    environment:
      POSTGRES_DB: cvscanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2025

    ports:
      - "5432:5432"

  cvscanner-app:
    build: .
    container_name: cvscanner-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cvscanner
      SPRING_DATASOURCE_USERNAME: postgres
       SPRING_DATASOURCE_PASSWORD:2025